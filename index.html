    body {
      font-family: var(--f-sans);
      background-color: var(--c-bg);
      color: var(--c-text);
      line-height: 1.6;
    }
    .serif { font-family: var(--f-serif); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e2dcd5; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #d2c9c0; }
    .nav-tab {
      padding: 0.5rem 1.25rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.2s;
      color: #8d6e63;
    }
    .nav-tab:hover { background: white; color: #5d4037; }
    .nav-tab.active {
      background: white;
      color: #8b4513;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      color: #8d6e63;
    }
    .mobile-nav-item.active { color: #8b4513; }
    .page-section { display: none; }
    .page-section.active { display: block; animation: fadeIn 0.4s ease-out; }
    .tile {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 56px;
      background: linear-gradient(to bottom right, #ffffff, #f0f0f0);
      border: 1px solid #d1d1d1;
      border-radius: 6px;
      font-size: 32px;
      margin: 4px;
      box-shadow: 1px 1px 0 #ccc, 2px 2px 0 #bbb, 3px 3px 4px rgba(0,0,0,0.15);
      cursor: default;
      transition: transform 0.2s;
      user-select: none;
    }
    .tile:hover { transform: translateY(-4px); }
    .luxury-border { position: relative; }
    .luxury-border::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--c-accent-light), transparent);
    }
    .nav-item-hover:hover {
      background-color: rgba(255, 255, 255, 0.4);
      transform: translateX(2px);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }

                      { cat: '花色系列', name: '清一色', tai: 8, desc: '整副牌由同一花色組成（萬、筒、條），或者全部是字牌。' },
                      { cat: '花色系列', name: '字一色', tai: 16, desc: '全副牌皆由字牌（風牌與三元牌）組成。' },
                      { cat: '大牌系列', name: '大三元', tai: 8, desc: '胡牌者完成中、發、白三組刻子。' },
                      { cat: '大牌系列', name: '小三元', tai: 4, desc: '胡牌者完成中、發、白其中兩組刻子，一組對子。' },
                      { cat: '大牌系列', name: '大四喜', tai: 16, desc: '胡牌者完成東、南、西、北四組刻子。' },
                      { cat: '大牌系列', name: '小四喜', tai: 8, desc: '胡牌者完成東、南、西、北其中三組刻子，一組對子。' },
                      { cat: '特殊胡牌', name: '天胡', tai: 24, desc: '只屬於莊家的特權，配牌後在莊家尚未打出第一張牌時，如果發現手內已完成胡牌型態。' },
                      { cat: '特殊胡牌', name: '地胡', tai: 16, desc: '只屬於子家的特權，配牌後第一次自摸就胡牌。' },
                      { cat: '特殊胡牌', name: '平胡', tai: 2, desc: '全部都是順子而沒有刻子。且對子不能是字牌，不能為獨聽或自摸。必須無字無花。' },
                      { cat: '特殊胡牌', name: '全求', tai: 2, desc: '胡牌時，手牌裡只剩一張單吊牌，其餘全為吃、碰或明槓。' },
                      { cat: '特殊胡牌', name: '八仙過海', tai: 8, desc: '當某家拿到全部八張花牌，可立即喊胡。' },
                      { cat: '聽牌系列', name: '獨聽', tai: 1, desc: '聽牌時只聽一張牌。' },
                      { cat: '聽牌系列', name: '天聽', tai: 8, desc: '莊家打出第一張牌後即聽牌，不得過水。' },
                      { cat: '聽牌系列', name: '地聽', tai: 4, desc: '海底八張內且無吃營槓時宣告聽牌，不得過水。' },
                      { cat: '其他加台', name: '風牌', tai: 1, desc: '拿到與當局圈風或自己門風相同的刻子。' },
                      { cat: '其他加台', name: '花牌', tai: 1, desc: '拿到與自己方位符合的花牌。' },
                      { cat: '其他加台', name: '春夏秋冬', tai: 2, desc: '花牌湊滿春夏秋冬。' },
                      { cat: '其他加台', name: '梅蘭竹菊', tai: 2, desc: '花牌湊滿梅蘭竹菊。' },
                      { cat: '其他加台', name: '海底撈月', tai: 1, desc: '海底最後一張而自摸。' },
                      { cat: '其他加台', name: '槓上開花', tai: 1, desc: '因補槓、暗槓、摸到花牌而補牌後胡牌。注意：明槓（槓別人的牌）補牌胡牌不算自摸，需算提供槓牌者放炮。' },
                      { cat: '其他加台', name: '搶槓胡', tai: 1, desc: '當對手加槓時，加槓的那一張牌剛好是胡牌者所要胡的牌。' }
                    ]
                  };
                  setTimeout(() => callback(mock), 500);
                }
              }
            }
          }
        }
      }
    }

    function init() {
      google.script.run.withSuccessHandler(data => {
        tutorialData = data;
        switchPage('basics');
      }).getTutorialData();
    }

    function switchPage(pageId) {
      currentPage = pageId;
      const contentArea = document.getElementById('page-content');
      
      // Update UI tabs
      document.querySelectorAll('.nav-tab, .mobile-nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`tab-${pageId}`)?.classList.add('active');
      document.getElementById(`m-tab-${pageId}`)?.classList.add('active');

      window.scrollTo({ top: 0, behavior: 'smooth' });

      if (pageId === 'tai') {
        renderTaiPage(contentArea);
      } else {
        renderLessonPage(pageId, contentArea);
      }
    }

    function renderLessonPage(type, container) {
      // Filter lessons into the 3 logical pages
      let lessonsToShow = [];
      if (type === 'basics') lessonsToShow = tutorialData.lessons.filter(l => l.category === '基礎入門');
      if (type === 'rules') lessonsToShow = tutorialData.lessons.filter(l => l.category === '基礎規則' || l.category === '特殊規則');
      if (type === 'patterns') lessonsToShow = tutorialData.lessons.filter(l => l.category === '牌型教學');

      container.innerHTML = lessonsToShow.map(lesson => `
        <div class="mb-16 animate-fade-in">
          <div class="mb-8">
            <span class="text-xs font-bold tracking-[0.3em] text-[#8b4513] uppercase block mb-4 opacity-60">${lesson.category}</span>
            <h2 class="text-3xl md:text-4xl font-bold serif text-[#2d241e] leading-tight">${lesson.title}</h2>
          </div>
          
          <div class="relative h-64 md:h-80 w-full mb-8 rounded-[2rem] overflow-hidden shadow-xl">
            <img src="${lesson.image}" class="w-full h-full object-cover object-bottom" referrerPolicy="no-referrer">
            <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
          </div>

          <article class="prose prose-stone max-w-none">
            <div class="text-lg text-gray-700 leading-relaxed">
              ${lesson.content}
            </div>
          </article>
        </div>
      `).join('<hr class="my-16 border-[#e2dcd5]" />');
    }

    function renderTaiPage(container) {
      const categories = [...new Set(tutorialData.taiPatterns.map(p => p.cat))];
      
      container.innerHTML = `
        <div class="animate-fade-in">
          <div class="mb-12">
            <h2 class="text-3xl md:text-4xl font-bold serif text-[#2d241e]">台數速查表</h2>
            <p class="text-xs text-[#8d6e63] tracking-widest uppercase mt-2">Tai Reference Table</p>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            ${categories.map(cat => `
              <div class="space-y-4">
                <h3 class="text-xs font-bold tracking-[0.2em] text-[#8d6e63] uppercase border-b border-[#e2dcd5] pb-2">${cat}</h3>
                <div class="space-y-3">
                  ${tutorialData.taiPatterns.filter(p => p.cat === cat).map(p => `
                    <div class="p-4 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow group">
                      <div class="flex justify-between items-start mb-1">
                        <b class="text-[#5d4037] group-hover:text-[#8b4513] transition-colors">${p.name}</b>
                        <span class="px-2 py-0.5 bg-[#fdfbf9] text-[#8b4513] text-xs font-bold rounded-lg border border-[#f0ede9]">${p.tai} 台</span>
                      </div>
                      <p class="text-xs text-gray-500 leading-relaxed">${p.desc}</p>
                    </div>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    window.onload = init;
  </script>
</body>
</html>
